services:
  - type: web
    name: alpha-gym
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: SQLITE_PATH
        value: /data
    disk:
      name: alpha-gym-data
      mountPath: /data
      sizeGB: 1
